<style>
  body { font-family: 'Arial', sans-serif; background: #f4f4f4; padding: 20px; }
  h1 { text-align: center; color: #333; }
  h2 { border-left: 5px solid red; padding-left: 10px; margin-top: 30px; color: #d32f2f; }
  
  .shop-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }

  .item-card {
    background: white;
    width: 280px;
    border-radius: 15px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    margin-bottom: 20px;
    transition: 0.3s;
  }

  .item-card:hover { transform: translateY(-5px); }

  /* Product Image Styling */
  .product-img {
    width: 100%;
    height: 180px;
    object-fit: cover; /* This makes the image fit nicely */
    background: #ddd;
  }

  .content { padding: 15px; }
  .price { font-weight: bold; color: #2e7d32; font-size: 1.2em; margin: 10px 0; }

  .button-group { display: flex; gap: 10px; }

  .btn-wallet { background: #000; color: white; flex: 2; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 0.8em; }
  .btn-like { background: #fff; color: red; border: 1px solid red; flex: 1; padding: 10px; border-radius: 5px; cursor: pointer; }
</style>

<!DOCTYPE html>
<html>
<head><title>Save More Dealz - Visual Flyer</title></head>
<body>

  <h1>🔥 Premium Township Deals 🔥</h1>

  <h2>🔴 Shoprite Specials</h2>
  <div class="shop-container">
    
    <div class="item-card">
      <img src="https://via.placeholder.com/300x200?text=Maize+Meal" class="product-img" alt="Maize Meal">
      <div class="content">
        <p>Ritebrand Maize Meal 10kg</p>
        <p class="price">R 99.00</p>
        <div class="button-group">
            <button class="btn-wallet" onclick="alert('Saving to Wallet...')">Add to Wallet</button>
            <button class="btn-like" onclick="alert('You liked Maize!')">❤️</button>
        </div>
      </div>
    </div>

    <div class="item-card">
      <img src="https://via.placeholder.com/300x200?text=Chicken+Pack" class="product-img" alt="Chicken">
      <div class="content">
        <p>Chicken Mixed Portions 2kg</p>
        <p class="price">R 75.00</p>
        <div class="button-group">
            <button class="btn-wallet" onclick="alert('Saving to Wallet...')">Add to Wallet</button>
            <button class="btn-like" onclick="alert('You liked Chicken!')">❤️</button>
        </div>
      </div>
    </div>

    </div>

  <h2>🟢 Checkers Gourmet</h2>
  <div class="shop-container">
    <div class="item-card">
      <img src="https://via.placeholder.com/300x200?text=Steak" class="product-img" alt="Steak">
      <div class="content">
        <p>Forage & Feast Steak</p>
        <p class="price">R 145.00</p>
        <div class="button-group">
            <button class="btn-wallet" onclick="alert('Saving to Wallet...')">Add to Wallet</button>
            <button class="btn-like" onclick="alert('You liked Steak!')">❤️</button>
        </div>
      </div>
    </div>
    </div>

</body>
</html>
