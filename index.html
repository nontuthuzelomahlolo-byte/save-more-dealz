<!DOCTYPE html>
<html>
<head>
  <title>Sava More - Smart Marketplace</title>

  <style>
    body { font-family: Arial; background:#f4f4f4; padding:20px; }

    h1 { text-align:center; }
    h2 { margin-top:40px; }

    /* ONE CONTINUOUS SCROLL */
    .shop-container {
      display:flex;
      overflow-x:auto;
      gap:10px;
      padding:10px;
      align-items:stretch;
    }

    .item-card {
      min-width:160px;
      background:white;
      border-radius:10px;
      box-shadow:0 3px 6px rgba(0,0,0,0.1);
      overflow:hidden;
      flex:0 0 auto;
    }

    .product-img { width:100%; height:110px; object-fit:cover; }

    .content { padding:8px; }

    .price { font-weight:bold; color:green; }

    .btn-like {
      width:100%;
      padding:5px;
      border-radius:5px;
      border:1px solid red;
      background:white;
      color:red;
      cursor:pointer;
    }

    .liked {
      background:red !important;
      color:white !important;
    }

    /* CATEGORY MARKER (INLINE) */
    .category-marker {
      min-width:120px;
      background:black;
      color:white;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:10px;
      font-weight:bold;
      flex:0 0 auto;
    }

    .floating-btn {
      position:fixed;
      bottom:20px;
      right:20px;
      background:black;
      color:white;
      padding:12px 16px;
      border-radius:30px;
      cursor:pointer;
    }

    .modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.5);
    }

    .modal-content {
      background:white;
      margin:10% auto;
      padding:20px;
      width:90%;
      max-width:400px;
      border-radius:10px;
    }

    select {
      width:100%;
      padding:8px;
      margin-bottom:15px;
      border-radius:5px;
    }

  </style>
</head>

<body>

<h1>🔥 Sava More Deals 🔥</h1>

<!-- STORES -->
<h2>🔴 Shoprite</h2>
<div class="shop-container" id="shoprite"></div>

<h2>🔵 Pick n Pay</h2>
<div class="shop-container" id="pnp"></div>

<h2>🟠 Boxer</h2>
<div class="shop-container" id="boxer"></div>

<!-- SERVICES -->
<h2>🛠️ Services</h2>

<select onchange="filterServices(this.value)">
  <option value="All">All Services</option>
  <option value="Home">Home</option>
  <option value="Auto">Auto</option>
  <option value="Lifestyle">Lifestyle</option>
</select>

<div class="shop-container" id="services"></div>

<!-- FLOAT BUTTON -->
<div class="floating-btn" onclick="openList()">🛒 My List</div>

<!-- MODAL -->
<div class="modal" id="listModal">
  <div class="modal-content" id="listContent"></div>
</div>

<script>

// CATEGORIES
const categories = ["Meat","Dairy","Bakery","Pantry"];

// GENERATE STORE DATA
function generateStore() {
  let store = [];

  categories.forEach(cat => {
    store.push({type:"category", name:cat});

    for(let i=1;i<=5;i++){
      store.push({
        type:"product",
        category:cat,
        name:cat+" Item "+i,
        price:Math.floor(Math.random()*80)+10
      });
    }
  });

  return store;
}

const stores = {
  "Shoprite": generateStore(),
  "Pick n Pay": generateStore(),
  "Boxer": generateStore()
};

// RENDER STORES
function renderStore(storeName, containerId) {
  let container = document.getElementById(containerId);

  stores[storeName].forEach(item => {

    if(item.type==="category"){
      let div = document.createElement("div");
      div.className="category-marker";
      div.innerText=item.name;
      container.appendChild(div);
    }

    if(item.type==="product"){
      let div = document.createElement("div");
      div.className="item-card";

      div.innerHTML=`
        <img src="https://via.placeholder.com/160x110?text=${item.name}" class="product-img">
        <div class="content">
          <p>${item.name}</p>
          <p class="price">R${item.price}</p>
          <button class="btn-like" onclick="likeProduct(this,'${storeName}','${item.name}',${item.price})">❤️</button>
        </div>
      `;

      container.appendChild(div);
    }

  });
}

// SERVICES
const services = [
  {name:"Plumber",category:"Home"},
  {name:"Electrician",category:"Home"},
  {name:"Painter",category:"Home"},
  {name:"Cleaner",category:"Home"},
  {name:"Builder",category:"Home"},

  {name:"Mechanic",category:"Auto"},
  {name:"Car Wash",category:"Auto"},
  {name:"Tyre Repair",category:"Auto"},
  {name:"Battery Fix",category:"Auto"},
  {name:"Tow Service",category:"Auto"},

  {name:"Hair Salon",category:"Lifestyle"},
  {name:"Spa",category:"Lifestyle"},
  {name:"Catering",category:"Lifestyle"},
  {name:"Fitness Coach",category:"Lifestyle"},
  {name:"Photographer",category:"Lifestyle"}
];

function renderServices(filter="All"){
  let container = document.getElementById("services");
  container.innerHTML="";

  services.forEach(s=>{
    if(filter==="All" || s.category===filter){

      let div=document.createElement("div");
      div.className="item-card";

      div.innerHTML=`
        <img src="https://via.placeholder.com/160x110?text=${s.name}" class="product-img">
        <div class="content">
          <p>${s.name}</p>
          <button class="btn-like" onclick="requestService('${s.name}')">❤️</button>
        </div>
      `;

      container.appendChild(div);
    }
  });
}

function filterServices(cat){
  renderServices(cat);
}

// LIKE PRODUCT
function likeProduct(btn,store,item,price){
  let list = JSON.parse(localStorage.getItem("shoppingList")) || [];
  list.push({store,item,price});
  localStorage.setItem("shoppingList", JSON.stringify(list));
  btn.classList.add("liked");
}

// OPEN LIST
function openList(){
  let list = JSON.parse(localStorage.getItem("shoppingList")) || [];
  let grouped={};
  let html="<h3>🛒 My List</h3>";

  list.forEach(i=>{
    if(!grouped[i.store]) grouped[i.store]=[];
    grouped[i.store].push(i);
  });

  let totalAll=0;

  for(let store in grouped){
    let total=0;
    html+="<h4>"+store+"</h4>";

    grouped[store].forEach(i=>{
      html+="<p>"+i.item+" - R"+i.price+"</p>";
      total+=i.price;
    });

    html+="<b>Total: R"+total+"</b><hr>";
    totalAll+=total;
  }

  html+="<h3>Total Basket: R"+totalAll+"</h3>";

  document.getElementById("listContent").innerHTML=html;
  document.getElementById("listModal").style.display="block";
}

// CLOSE MODAL
window.onclick=function(e){
  if(e.target==document.getElementById("listModal")){
    document.getElementById("listModal").style.display="none";
  }
}

// SERVICE REQUEST
function requestService(service){
  if(confirm("Request "+service+" to contact you?")){
    let name=prompt("Name:");
    let phone=prompt("Phone:");
    if(name && phone){
      alert("Request sent 📞");
    }
  }
}

// INIT
renderStore("Shoprite","shoprite");
renderStore("Pick n Pay","pnp");
renderStore("Boxer","boxer");
renderServices();

</script>

</body>
</html>
