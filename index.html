<!DOCTYPE html>
<html>
<head>
  <title>Save More Dealz - Township Flyer</title>

  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; }
    h1 { text-align: center; color: #333; }
    h2 { border-left: 5px solid #333; padding-left: 10px; margin-top: 40px; color: #222; }

    .shop-container { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; }

    .item-card {
      background: white;
      width: 250px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .product-img { width: 100%; height: 150px; object-fit: cover; background: #eee; }

    .content { padding: 12px; }
    .item-name { font-size: 0.9em; height: 40px; margin: 0; }
    .price { font-weight: bold; color: #2e7d32; font-size: 1.1em; margin: 8px 0; }

    .button-group { display: flex; gap: 8px; }

    .btn-wallet {
      background: #000;
      color: white;
      flex: 3;
      border: none;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.75em;
      font-weight: bold;
    }

    .btn-like {
      background: #fff;
      color: red;
      border: 1px solid red;
      flex: 1;
      padding: 8px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<h1>🔥 Premium Township Deals 🔥</h1>

<h2 style="border-color: red;">🔴 Shoprite</h2>
<div class="shop-container">

  <div class="item-card">
    <img src="https://via.placeholder.com/250x150?text=Maize+Meal" class="product-img">
    <div class="content">
      <p class="item-name">Ritebrand Maize Meal 10kg</p>
      <p class="price">R 99.00</p>
      <div class="button-group">
        <button class="btn-wallet" onclick="saveDeal('Ritebrand Maize Meal 10kg')">Add to Wallet</button>
        <button class="btn-like" onclick="likeDeal(this,'Ritebrand Maize Meal 10kg')">❤️</button>
      </div>
    </div>
  </div>

  <div class="item-card">
    <img src="https://via.placeholder.com/250x150?text=Chicken" class="product-img">
    <div class="content">
      <p class="item-name">Mixed Chicken Portions 2kg</p>
      <p class="price">R 75.00</p>
      <div class="button-group">
        <button class="btn-wallet" onclick="saveDeal('Mixed Chicken Portions 2kg')">Add to Wallet</button>
        <button class="btn-like" onclick="likeDeal(this,'Mixed Chicken Portions 2kg')">❤️</button>
      </div>
    </div>
  </div>

</div>

<script>

// SAVE DEAL
function saveDeal(item) {
  let saved = JSON.parse(localStorage.getItem("savedDeals")) || [];

  if (!saved.includes(item)) {
    saved.push(item);
    localStorage.setItem("savedDeals", JSON.stringify(saved));
    alert(item + " added to your list 🛒");
  } else {
    alert("Already saved ✔️");
  }
}

// LIKE DEAL
function likeDeal(button, item) {
  let likes = JSON.parse(localStorage.getItem("likedDeals")) || [];

  if (!likes.includes(item)) {
    likes.push(item);
    localStorage.setItem("likedDeals", JSON.stringify(likes));
  }

  button.style.backgroundColor = "green";
  button.style.color = "white";
}

// KEEP LIKES AFTER REFRESH
window.onload = function() {
  let likes = JSON.parse(localStorage.getItem("likedDeals")) || [];

  document.querySelectorAll(".btn-like").forEach(btn => {
    let item = btn.getAttribute("onclick").match(/'(.*?)'/)[1];

    if (likes.includes(item)) {
      btn.style.backgroundColor = "green";
      btn.style.color = "white";
    }
  });
};

</script>

</body>
</html>
