<!DOCTYPE html>
<html>
<head>
  <title>Sava More - Smart Flyer</title>

  <style>
    body { font-family: Arial; background:#f4f4f4; padding:20px; }

    h1 { text-align:center; }
    h2 { margin-top:40px; }

    .shop-container {
      display:flex;
      overflow-x:auto;
      gap:15px;
      padding:10px;
      scroll-snap-type:x mandatory;
    }

    .item-card {
      min-width:200px;
      flex:0 0 auto;
      background:white;
      border-radius:10px;
      box-shadow:0 3px 6px rgba(0,0,0,0.1);
      overflow:hidden;
      scroll-snap-align:start;
    }

    .product-img { width:100%; height:130px; object-fit:cover; }

    .content { padding:10px; }

    .price { font-weight:bold; color:green; }

    .btn-like {
      width:100%;
      padding:6px;
      border-radius:5px;
      border:1px solid red;
      background:white;
      color:red;
      cursor:pointer;
    }

    .liked {
      background:red !important;
      color:white !important;
    }

    .floating-btn {
      position:fixed;
      bottom:20px;
      right:20px;
      background:black;
      color:white;
      padding:12px 16px;
      border-radius:30px;
      cursor:pointer;
    }

    .modal {
      display:none;
      position:fixed;
      top:0; left:0;
      width:100%; height:100%;
      background:rgba(0,0,0,0.5);
    }

    .modal-content {
      background:white;
      margin:10% auto;
      padding:20px;
      width:90%;
      max-width:400px;
      border-radius:10px;
    }

    /* SEARCH + FILTER */
    .search-box {
      width:100%;
      padding:8px;
      margin-bottom:10px;
      border-radius:5px;
      border:1px solid #ccc;
    }

    .categories {
      display:flex;
      gap:10px;
      overflow-x:auto;
      margin-bottom:10px;
    }

    .cat-btn {
      padding:6px 10px;
      background:#ddd;
      border:none;
      border-radius:20px;
      cursor:pointer;
      white-space:nowrap;
    }

    .active {
      background:black;
      color:white;
    }

  </style>
</head>

<body>

<h1>🔥 Sava More Deals 🔥</h1>

<!-- SERVICES SECTION -->
<h2>🛠️ Services</h2>

<input type="text" id="searchInput" class="search-box" placeholder="Search service..." onkeyup="filterServices()">

<div class="categories">
  <button class="cat-btn active" onclick="setCategory('All', this)">All</button>
  <button class="cat-btn" onclick="setCategory('Home', this)">Home</button>
  <button class="cat-btn" onclick="setCategory('Auto', this)">Auto</button>
  <button class="cat-btn" onclick="setCategory('Lifestyle', this)">Lifestyle</button>
</div>

<div class="shop-container" id="services"></div>

<!-- FLOAT BUTTON -->
<div class="floating-btn" onclick="openList()">🛒 My List</div>

<!-- MODAL -->
<div class="modal" id="listModal">
  <div class="modal-content" id="listContent"></div>
</div>

<script>

// SERVICES DATA WITH CATEGORY
const services = [
  {name:"Plumber", category:"Home"},
  {name:"Electrician", category:"Home"},
  {name:"Painter", category:"Home"},
  {name:"Mechanic", category:"Auto"},
  {name:"Car Wash", category:"Auto"},
  {name:"Hair Salon", category:"Lifestyle"},
  {name:"Catering", category:"Lifestyle"}
];

let currentCategory = "All";

// RENDER SERVICES
function renderServices() {
  let container = document.getElementById("services");
  container.innerHTML = "";

  let search = document.getElementById("searchInput").value.toLowerCase();

  services.forEach(s => {

    let matchSearch = s.name.toLowerCase().includes(search);
    let matchCategory = currentCategory === "All" || s.category === currentCategory;

    if (matchSearch && matchCategory) {
      let div = document.createElement("div");
      div.className = "item-card";

      div.innerHTML = `
        <img src="https://via.placeholder.com/200x130?text=${s.name}" class="product-img">
        <div class="content">
          <p>${s.name}</p>
          <button class="btn-like" onclick="requestService('${s.name}')">❤️</button>
        </div>
      `;

      container.appendChild(div);
    }
  });
}

// FILTER FUNCTIONS
function filterServices() {
  renderServices();
}

function setCategory(cat, btn) {
  currentCategory = cat;

  document.querySelectorAll(".cat-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");

  renderServices();
}

// SERVICE REQUEST
function requestService(service) {
  if(confirm("Request "+service+" to contact you?")) {
    let name = prompt("Name:");
    let phone = prompt("Phone:");

    if(name && phone){
      alert("Request sent 📞");
      console.log({service,name,phone});
    }
  }
}

// INIT
renderServices();

</script>

</body>
</html>
